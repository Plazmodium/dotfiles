# ╔═══════════════════════════════════════════════════════════════╗
# ║  STARFIELD STARSHIP CONFIG                                    ║
# ║  Inspired by the Starfield game color palette                 ║
# ╚═══════════════════════════════════════════════════════════════╝

# Enable editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"
# ═══════════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════════
add_newline = true
command_timeout = 2000
scan_timeout = 50
# Use the Starfield color palette
palette = "starfield"

# ═══════════════════════════════════════════════════════════════
# COLOR PALETTE - STARFIELD
# ═══════════════════════════════════════════════════════════════
# Gold:    #d4ac63 - Primary accent, achievements, highlights
# Red:     #cd2435 - Errors, critical alerts, danger
# Orange:  #e56335 - Warnings, secondary accent, energy
# Navy:    #2b4d7d - Deep space blue, backgrounds, stability
# White:   #f4f5f7 - Clean text, UI elements, contrast

[palettes.starfield]
# Core colors
gold = "#d4ac63"
red = "#cd2435"
orange = "#e56335"
navy = "#2b4d7d"
white = "#f4f5f7"
# Extended palette
space_black = "#0d1117"
nebula_purple = "#4a3f6b"
# Semantic aliases
warning = "#e56335"
error = "#cd2435"
info = "#2b4d7d"
success = "#d4ac63"
primary = "#d4ac63"
accent = "#e56335"
muted = "#6b7280"
# ═══════════════════════════════════════════════════════════════
# PROMPT FORMAT
# ═══════════════════════════════════════════════════════════════
format = """
[░▒▓](gold)\
$os\
$sudo\
[](bg:orange fg:gold)\
$directory\
[](fg:orange bg:navy)\
$custom\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$c\
$cmake\
$golang\
$java\
$kotlin\
$lua\
$nodejs\
$php\
$python\
$ruby\
$rust\
$swift\
$zig\
$docker_context\
$conda\
$meson\
$spack\
[](fg:navy bg:space_black)\
$time\
[ ](fg:space_black)\
$line_break\
$jobs\
$status\
$cmd_duration\
$character"""
# Right-aligned cloud services and infrastructure
right_format = """
$localip\
$nats\
$aws\
$gcloud\
$azure\
$openstack\
$kubernetes\
$helm\
$terraform\
$pulumi\
$vagrant\
$nix_shell\
$container\
$singularity\
"""

