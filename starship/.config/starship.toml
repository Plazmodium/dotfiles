# ═══════════════════════════════════════════════════════════════
# GIT MODULES
# ═══════════════════════════════════════════════════════════════

[git_branch]
symbol = ""
style = "bg:navy fg:white"
format = "[ $symbol $branch(:$remote_branch) ]($style)"
truncation_length = 25
truncation_symbol = "…"

[git_commit]
style = "bg:navy fg:white"
format = "[ $hash$tag ]($style)"
commit_hash_length = 7
tag_symbol = " 🏷 "
only_detached = true
tag_disabled = false

[git_state]
style = "bg:navy fg:white"
format = '[ \($state( $progress_current/$progress_total)\) ]($style)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_status]
style = "bg:navy fg:white"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "⚔${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "📦${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "
typechanged = "➜${count} "

[git_metrics]
disabled = false
added_style = "bg:navy fg:white"
deleted_style = "bg:navy fg:white"
format = "([+$added ]($added_style))([-$deleted ]($deleted_style))"
only_nonzero_diffs = true

# ═══════════════════════════════════════════════════════════════
# GIT REMOTE SERVICE DETECTION
# ═══════════════════════════════════════════════════════════════

[custom.git_remote]
description = "Display icon for remote Git server"
command = """
GIT_REMOTE=$(git remote get-url origin 2>/dev/null)
case "$GIT_REMOTE" in
    *github*)     echo " " ;;
    *gitlab*)     echo " " ;;
    *bitbucket*)  echo " " ;;
    *codeberg*)   echo " " ;;
    *gitea*)      echo " " ;;
    *azure*)      echo "󰿕 " ;;
    *codecommit*) echo " " ;;
    *sr.ht*)      echo " " ;;
    *forgejo*)    echo " " ;;
    *gogs*)       echo " " ;;
    *gitee*)      echo " " ;;
    *)            [[ -n "$GIT_REMOTE" ]] && echo " " ;;
esac
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bg:navy fg:white"
format = "[$output]($style)"
shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

