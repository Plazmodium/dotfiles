shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

[custom.jenkins]
description = "Jenkins"
command = "echo 'jenkins'"
when = "[[ -n \"$JENKINS_URL\" ]] || [[ -f Jenkinsfile ]]"
style = "bold red"
symbol = "󰿌 "
format = "[$symbol$output ]($style)"
shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

# ═══════════════════════════════════════════════════════════════
# CUSTOM MODULES - NETWORK & CONNECTION STATUS
# ═══════════════════════════════════════════════════════════════

[custom.ssh_indicator]
description = "Show SSH connection status"
command = "echo 'SSH'"
when = "[[ -n \"$SSH_CONNECTION\" ]]"
style = "bold red"
symbol = "󰣀 "
format = "[$symbol$output ]($style)"
shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

[custom.vpn]
description = "Show VPN connection status"
command = """
if ip link show tun0 &>/dev/null || ip link show wg0 &>/dev/null || ip link show tailscale0 &>/dev/null; then
    echo "VPN"
fi
"""
when = "command -v ip &>/dev/null"
style = "bold gold"
symbol = "󰖂 "
format = "[$symbol$output ]($style)"
shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

